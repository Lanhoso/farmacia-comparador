name: Scrape Pharmacy Prices

on:
  schedule:
    - cron: '0 3 * * *'   # 00:00 Chile (UTC-3)
    - cron: '0 9 * * *'   # 06:00 Chile (UTC-3)
    - cron: '0 15 * * *'  # 12:00 Chile (UTC-3)
    - cron: '0 21 * * *'  # 18:00 Chile (UTC-3)
  workflow_dispatch:       # Permite rodar manualmente

jobs:
  scrape:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Install Playwright Chromium
        run: playwright install chromium

      - name: Run scraper
        run: python scraper.py "Metformina 850mg"

      - name: Commit and push data
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add -f data/*.json
          git diff --cached --quiet || git commit -m "chore: update prices $(date -u '+%Y-%m-%d %H:%M UTC')"
          git pull --rebase --autostash origin main
          git push
